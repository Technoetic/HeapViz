server {
    listen ${PORT} default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # KMA API proxy to bypass CORS
    location /api/kma/ {
        proxy_pass https://apihub.kma.go.kr/api/;
        proxy_set_header Host apihub.kma.go.kr;
        proxy_ssl_server_name on;
    }

    # BizRouter LLM API proxy (hides API key)
    location /api/llm/ {
        proxy_pass https://bizrouter.ai/api/v1/;
        proxy_set_header Host bizrouter.ai;
        proxy_set_header Authorization "Bearer ${BIZROUTER_API_KEY}";
        proxy_set_header Content-Type "application/json";
        proxy_ssl_server_name on;
    }
}
